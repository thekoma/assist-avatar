# assist-avatar — REMOTE entrypoint (one-line github:// install). v0.5.0+.
#
# Add to your device YAML, AFTER the official voice-assistant factory package:
#
#   packages:
#     esphome.voice-assistant: github://esphome/wake-word-voice-assistants/esp32-s3-box-3/esp32-s3-box-3.factory.yaml@main
#     assist-avatar: github://thekoma/assist-avatar/avatar-remote.yaml@v0.5.0
#
# then declare your per-state `avatar:` block (see the README / the example YAML).
#
# What this does:
#  - pulls the `avatar` external_component from this repo (the render engine +
#    codegen that mints the per-state Home-Assistant controls), and
#  - overlays the display pages (avatar-pages.yaml) so each assistant state is
#    drawn by the avatar.
#
# Pin a release tag (e.g. @v0.5.0), not @main: the external_components `ref:` below
# is pinned to the SAME tag, so the YAML, the page overlay and the C++ are fetched
# from one commit (no skew). The nested `!include` resolves inside the fetched repo
# (verified against ESPHome 2026.5.x); the page `!extend` targets exist because the
# voice-assistant package is merged before this one.
external_components:
  - source:
      type: git
      url: https://github.com/thekoma/assist-avatar.git
      ref: v0.5.0
      path: components
    components: [avatar]
    refresh: 1d

packages:
  avatar_pages: !include avatar-pages.yaml
