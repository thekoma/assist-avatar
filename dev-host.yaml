esphome:
  name: avatar-dev
  includes:
    - components/avatar/base/avatar_module.h
    - components/avatar/animations
    - components/avatar/base/avatar_math.h
    - components/avatar/base/avatar_draw.h
    - components/avatar/base/avatar.h

host:

logger:

font:
  - file: "gfonts://VT323"   # classic CRT / phosphor terminal font
    id: ui_font
    size: 26
    glyphsets: ["GF_Latin_Core"]

globals:
  - id: anim_index        # which animation of the catalogue we're auditioning
    type: int
    initial_value: '0'

display:
  - platform: sdl
    id: avatar_display
    dimensions:
      width: 320
      height: 240
    update_interval: 16ms  # ~60fps; smoothness only — animation speed is time-based
    lambda: |-
      // AUDITION MODE: click the window to cycle through the whole animation
      // catalogue; each one is shown full-screen with its name at the top.
      avatar::render_anim(it, id(anim_index), millis(), avatar::cyan());
      avatar::print_centered(it, 6, id(ui_font), avatar::cyan(170),
                             avatar::anim_name(id(anim_index)));

touchscreen:
  - platform: sdl
    display: avatar_display
    on_touch:
      - lambda: |-
          id(anim_index) = (id(anim_index) + 1) % avatar::ANIM_COUNT;
          ESP_LOGI("avatar", "anim -> %s", avatar::anim_name(id(anim_index)));
