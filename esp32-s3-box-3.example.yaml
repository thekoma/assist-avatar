# Example device config for an ESP32-S3-Box-3 running the assist-avatar overlay (v0.4.0+).
#
# 1. Copy this file (e.g. `cp esp32-s3-box-3.example.yaml my-box.yaml`).
# 2. Copy secrets.yaml.example to secrets.yaml and fill it in.
# 3. Flash:  esphome run my-box.yaml   (USB for the first flash, OTA after).
#
# It keeps the official voice-assistant firmware untouched and only layers the
# avatar on top, so wake word / voice / connection states all keep working.

substitutions:
  name: esp32-s3-box-3
  friendly_name: Box 3

packages:
  # Official Nabu Casa voice-assistant firmware (kept intact, still upgradable):
  esphome.voice-assistant: github://esphome/wake-word-voice-assistants/esp32-s3-box-3/esp32-s3-box-3.factory.yaml@main
  # The avatar overlay — pulls the component + page overrides. Pin a release tag:
  assist-avatar: github://thekoma/assist-avatar/avatar-remote.yaml@v0.4.0
  #
  # Local alternative (clone the repo / copy components/ + avatar-pages.yaml next to
  # this YAML): remove the line above and instead add, at the top level of this file:
  #   external_components:
  #     - source: { type: local, path: components }
  #       components: [avatar]
  #   packages:
  #     avatar_pages: !include avatar-pages.yaml

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

api:
  encryption:
    key: !secret api_key

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Per-state animation. Each state is just `animation: <id>`; the component
# auto-mints the Home-Assistant controls — `<State> animation`, `<State> animation
# speed`, `<State> animation variation` (where the animation has variations) and
# `<State> accent` — and your choices PERSIST across reboot (the values below are
# only the first-boot defaults). Catalogue: amber_pulse, breathing_ring, converging,
# dim_ring, loading_arc, orb, orbits, scan_arc, sonar, waveform.
avatar:
  idle:      { animation: breathing_ring }
  listening: { animation: converging }
  thinking:  { animation: orb, variation: {} }   # orb is the only one with variations
  replying:  { animation: waveform }
  error:     { animation: amber_pulse }
  muted:     { animation: dim_ring }
  booting:   { animation: loading_arc }
  no_wifi:   { animation: sonar }
  no_ha:     { animation: scan_arc }
