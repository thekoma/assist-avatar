# assist-avatar — ESPHome package
#
# Renders an animated, cyberpunk-flavoured avatar on the ESP32-S3-Box-3 voice
# assistant display. Add this package AFTER the official voice-assistant package;
# it overrides ONLY each display page's lambda (so the avatar is drawn instead of
# the static casita_* images) and bumps the refresh rate for animation. All
# upstream logic — wake word, voice_assistant, the page-switching that already
# handles idle/listening/thinking/replying/error/muted AND the connection states
# (no-wifi / no-HA / initializing) — is kept untouched.
#
# The avatar phase is implied by which page upstream shows, so no extra wiring
# (phase globals, wifi checks) is needed here.

esphome:
  includes:
    - avatar_math.h
    - avatar_draw.h
    - avatar.h

font:
  - file: "gfonts://VT323"   # classic CRT / phosphor terminal font
    id: ui_font
    size: 26
    glyphsets: ["GF_Latin_Core"]

# Record when the STT request / TTS response text arrives, so the page lambdas
# can "type it out" from that moment.
globals:
  - id: text_req_t0
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: text_resp_t0
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: accent_color           # avatar accent colour, controllable from HA at runtime
    type: esphome::Color
    restore_value: false
    initial_value: 'esphome::Color(0, 255, 217)'   # default cyan
  - id: text_custom_color      # custom text colour (used when "Text colour" = Custom)
    type: esphome::Color
    restore_value: false
    initial_value: 'esphome::Color(130, 255, 160)'  # default phosphor green

# A virtual RGB light exposed to Home Assistant as a colour picker. It drives no
# real LED — its chosen colour is read into `accent_color` and used to recolour
# the avatar live (no reflash needed).
output:
  - platform: template
    type: float
    id: accent_out_r
    write_action:
      - lambda: ''   # colour is read via the light's on_state below
  - platform: template
    type: float
    id: accent_out_g
    write_action:
      - lambda: ''
  - platform: template
    type: float
    id: accent_out_b
    write_action:
      - lambda: ''
  - platform: template
    type: float
    id: text_out_r
    write_action:
      - lambda: ''
  - platform: template
    type: float
    id: text_out_g
    write_action:
      - lambda: ''
  - platform: template
    type: float
    id: text_out_b
    write_action:
      - lambda: ''

light:
  - platform: rgb
    name: "Avatar accent"
    id: accent_light
    red: accent_out_r
    green: accent_out_g
    blue: accent_out_b
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      - lambda: |-
          auto v = id(accent_light).remote_values;
          if (v.get_state() > 0.0f)
            id(accent_color) = esphome::Color((uint8_t) (v.get_red() * 255),
                                              (uint8_t) (v.get_green() * 255),
                                              (uint8_t) (v.get_blue() * 255));
  - platform: rgb
    name: "Avatar text"
    id: text_light
    red: text_out_r
    green: text_out_g
    blue: text_out_b
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      - lambda: |-
          auto v = id(text_light).remote_values;
          if (v.get_state() > 0.0f)
            id(text_custom_color) = esphome::Color((uint8_t) (v.get_red() * 255),
                                                   (uint8_t) (v.get_green() * 255),
                                                   (uint8_t) (v.get_blue() * 255));

select:
  - platform: template
    name: "Text colour"
    id: text_color_mode
    icon: "mdi:format-color-text"
    optimistic: true
    restore_value: true
    options:
      - "Match accent"
      - "Custom"
    initial_option: "Custom"

text_sensor:
  - id: !extend text_request
    on_value:
      - lambda: 'id(text_req_t0) = millis();'
  - id: !extend text_response
    on_value:
      - lambda: 'id(text_resp_t0) = millis();'

display:
  - id: !extend s3_box_lcd   # extend the upstream display, don't create a new one
    update_interval: 66ms    # animate (~15fps); upstream leaves this at "never"
    pages:
      - id: !extend idle_page
        lambda: 'avatar::render(it, avatar::IDLE, millis(), id(accent_color));'
      - id: !extend listening_page
        lambda: 'avatar::render(it, avatar::LISTENING, millis(), id(accent_color));'
      - id: !extend thinking_page
        lambda: |-
          avatar::render(it, avatar::THINKING, millis(), id(accent_color));
          auto txt = id(text_color_mode).state == "Match accent" ? id(accent_color)
                                                                  : id(text_custom_color);
          avatar::draw_dialog(it, id(ui_font), id(text_request).state.c_str(), "",
                              txt, millis(), id(text_req_t0), 0, 22.0f);
      - id: !extend replying_page
        lambda: |-
          avatar::render(it, avatar::REPLYING, millis(), id(accent_color));
          auto txt = id(text_color_mode).state == "Match accent" ? id(accent_color)
                                                                  : id(text_custom_color);
          avatar::draw_dialog(it, id(ui_font), id(text_request).state.c_str(),
                              id(text_response).state.c_str(),
                              txt, millis(), 0, id(text_resp_t0), 22.0f);
      - id: !extend timer_finished_page
        lambda: 'avatar::render(it, avatar::REPLYING, millis(), id(accent_color));'
      - id: !extend error_page
        lambda: 'avatar::render(it, avatar::ERROR, millis(), id(accent_color));'
      - id: !extend no_ha_page
        lambda: 'avatar::render(it, avatar::NO_HA, millis(), id(accent_color));'
      - id: !extend no_wifi_page
        lambda: 'avatar::render(it, avatar::NO_WIFI, millis(), id(accent_color));'
      - id: !extend initializing_page
        lambda: 'avatar::render(it, avatar::BOOTING, millis(), id(accent_color));'
      - id: !extend muted_page
        lambda: 'avatar::render(it, avatar::MUTED, millis(), id(accent_color));'
