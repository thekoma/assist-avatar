# assist-avatar — LOCAL entrypoint.
#
# Use this when the C++ headers live next to your device YAML — i.e. the SDL dev
# config here, a local `esphome run`, or Home Assistant's /config/esphome/ with the
# repo files copied in. ESPHome copies the headers into the build (they resolve
# relative to your main YAML).
#
# For a one-line remote install (no files to copy) use avatar-remote.yaml instead.
#
# Add this package AFTER the official voice-assistant package; it overrides ONLY
# each display page's lambda (so the avatar is drawn instead of the static images)
# and bumps the refresh rate. All upstream logic is kept untouched.

esphome:
  includes:
    - src/avatar_math.h
    - src/avatar_draw.h
    - src/avatar.h

packages:
  body: !include _avatar-body.yaml
